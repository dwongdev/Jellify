appId: com.cosmonautical.jellify
---
# Playlist Management Test
# Tests adding tracks to playlists and viewing playlists

# Navigate to Library tab
- assertVisible:
    id: "library-tab-button"

- tapOn:
    id: "library-tab-button"

- takeScreenshot: screenshots/35_library_home

- assertVisible:
    id: "library-playlists-tab-button"

# Navigate to Tracks tab
- tapOn:
    id: "library-tracks-tab-button"

- scrollUntilVisible:
    element: 
      id: "track-item-0"
    direction: up


# Wait for tracks to load
- extendedWaitUntil:
    visible:
      id: "track-item-0"
    timeout: 30000

# Take screenshot of tracks list
- takeScreenshot: screenshots/36_tracks_list

# Long press on first track to open context menu
- longPressOn:
    id: "track-item-0"

# Wait for menu to appear
- waitForAnimationToEnd

# Take screenshot of track context menu
- takeScreenshot: screenshots/37_track_context_menu

# Look for "Add to Playlist" option
- tapOn:
    text: "Add to Playlist"
    optional: true

# Take screenshot of playlist selection
- takeScreenshot: screenshots/38_add_to_playlist

# Cancel or go back if menu is open
- tapOn:
    text: "Cancel"
    optional: true

- pressKey: BACK

# Navigate to Playlists tab
- tapOn:
    id: "library-tab-button"

- tapOn:
    id: "library-playlists-tab-button"

# Take screenshot of playlists view
- takeScreenshot: screenshots/39_playlists_view

# Return to home
- tapOn:
    id: "home-tab-button"
