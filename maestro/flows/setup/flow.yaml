appId: com.cosmonautical.jellify
---
- launchApp:
    clearState: true

# Take a screenshot after brief wait to see loading state
- takeScreenshot: screenshots/setup/initial_launch_state

# Give CI emulator time to fully initialize the app after launch
- extendedWaitUntil:
    visible:
      id: "server_address_screen"
    timeout: 90000

# Handle permission dialogs (may appear before or after login screen)
- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "While using the app"
    optional: true

# Dismiss any system dialogs (OTA updates, etc.)
- tapOn:
    text: "Later"
    optional: true
- tapOn:
    text: "Skip"
    optional: true
- tapOn:
    text: "Cancel"
    optional: true
- tapOn:
    text: "No thanks"
    optional: true
- tapOn:
    text: "Dismiss"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- tapOn:
    text: "Not now"
    optional: true
- tapOn:
    text: "DENY"
    optional: true
- tapOn:
    text: "DON'T ALLOW"
    optional: true

# Wait again for the login screen in case dialogs covered it
- extendedWaitUntil:
    visible:
      id: "server_address_screen"
    timeout: 30000

- runFlow: select-server.yaml
- runFlow: login.yaml
- runFlow: select-library.yaml
