name: Publish Over-the-Air Update
on:
  workflow_dispatch:

jobs:
  publish-ota-update:
    runs-on: macos-15
    steps:
      - name: 🛒 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.SIGNING_REPO_PAT }}

      - name: 🖥 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: 🥟 Run bun install
        run: bun i

      - name: 👩‍💻 Configure Git
        run: |
          git config --global user.email "violet@cosmonautical.cloud"
          git config --global user.name "anultravioletaurora"

      - name: 🤖 Publish Android Update
        run: bun run sendOTA:android
        env:
          SIGNING_REPO_PAT: ${{ secrets.SIGNING_REPO_PAT }}

      - name: 🍎 Publish iOS Update
        run: bun run sendOTA:iOS
        env:
          SIGNING_REPO_PAT: ${{ secrets.SIGNING_REPO_PAT }}

      - name: Get the previous release's tag
        id: get_previous_release
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.SIGNING_REPO_PAT }}
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1,
            });
            const previousRelease = releases.data[0];
            core.setOutput('tag', previousRelease ? previousRelease.tag_name : '');

      - name: 📝 Generate Release Notes
        id: generate_release_notes
        uses: ./.github/actions/generate-release-notes
        with: 
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          version: "${{ steps.get_previous_release.outputs.tag }} - OTA Update"

      - name: 🎉 Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: "${{ steps.get_previous_release.outputs.tag }}-ota-${{ github.run_number }}"
          name: "${{ steps.get_previous_release.outputs.tag }} - OTA Update"
          body: "${{ steps.generate_release_notes.outputs.release_notes }}"
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.SIGNING_REPO_PAT }}
 
