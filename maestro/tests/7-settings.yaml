appId: com.cosmonautical.jellify
---
# Wait for app to be ready, then navigate to Settings tab
- assertVisible:
    id: 'settings-tab-button'
- tapOn:
    id: 'settings-tab-button'

# ============================================================
# HUB — verify all navigation elements by testID, not just text
# ============================================================
- extendedWaitUntil:
    visible:
      id: 'settings-screen-root'
    timeout: 10000
- waitForAnimationToEnd

- assertVisible:
    id: 'settings-profile-card'
- assertVisible:
    id: 'settings-nav-appearance'
- assertVisible:
    id: 'settings-nav-gestures'
- assertVisible:
    id: 'settings-nav-playback'
- assertVisible:
    id: 'settings-nav-storage'
- assertVisible:
    id: 'settings-nav-privacy-developer'
- assertVisible:
    id: 'settings-nav-about'
- assertVisible:
    id: 'settings-signout-button'
# Also verify the text labels render inside the rows
- assertVisible:
    text: 'Appearance'
- assertVisible:
    text: 'Gestures'
- assertVisible:
    text: 'Playback'
- assertVisible:
    text: 'Storage'
- assertVisible:
    text: 'Privacy & Developer'
- assertVisible:
    text: 'About'
- takeScreenshot: screenshots/19_settings_hub

# ============================================================
# APPEARANCE — exercise color scheme toggle, verify with screenshots
# ============================================================
- tapOn:
    id: 'settings-nav-appearance'
- extendedWaitUntil:
    visible:
      id: 'settings-screen-appearance'
    timeout: 10000
- waitForAnimationToEnd

- assertVisible:
    text: 'Theme'
- assertVisible:
    text: 'Match Device'
- assertVisible:
    text: 'Light'
- assertVisible:
    text: 'Dark'
- assertVisible:
    text: 'OLED Black'
- assertVisible:
    text: 'Color Scheme'
- assertVisible:
    text: 'Purple'
- assertVisible:
    text: 'Ocean'
- assertVisible:
    text: 'Forest'
- assertVisible:
    text: 'Sunset'
- assertVisible:
    text: 'Peanut'
- takeScreenshot: screenshots/20_settings_appearance

# Toggle to Ocean, screenshot the state change, then restore
- tapOn:
    text: 'Ocean'
- takeScreenshot: screenshots/20a_appearance_ocean_selected
- tapOn:
    text: 'Purple'
- takeScreenshot: screenshots/20b_appearance_purple_restored

# Scroll down to verify Hide Runtimes switch is reachable
- scroll:
    direction: DOWN
- assertVisible:
    text: 'Hide Runtimes'
    optional: true
- takeScreenshot: screenshots/20c_appearance_scrolled

# Return to hub via back button (tests Android back navigation)
- pressKey: back
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: 'settings-screen-root'
    timeout: 5000

# ============================================================
# GESTURES — verify chip state changes with screenshots
# ============================================================
- assertVisible:
    id: 'settings-screen-root'
- tapOn:
    id: 'settings-nav-gestures'
- extendedWaitUntil:
    visible:
      id: 'settings-screen-gestures'
    timeout: 10000
- waitForAnimationToEnd

- assertVisible:
    text: 'Swipe Left'
- assertVisible:
    text: 'Swipe Right'
# All eight action chips present (use testIDs — Tamagui renders icons
# inside the button, making iOS accessibility labels unreliable for text match)
- assertVisible:
    id: 'swipe-left-chip-favorite'
- assertVisible:
    id: 'swipe-left-chip-add-to-playlist'
- assertVisible:
    id: 'swipe-left-chip-add-to-queue'
- assertVisible:
    id: 'swipe-left-chip-play-next'
- assertVisible:
    id: 'swipe-right-chip-favorite'
- assertVisible:
    id: 'swipe-right-chip-add-to-playlist'
- assertVisible:
    id: 'swipe-right-chip-add-to-queue'
- assertVisible:
    id: 'swipe-right-chip-play-next'
- takeScreenshot: screenshots/21_settings_gestures

# Toggle left Play Next: enable → screenshot → disable → screenshot
- tapOn:
    id: 'swipe-left-chip-play-next'
- takeScreenshot: screenshots/21a_gestures_play_next_on
- tapOn:
    id: 'swipe-left-chip-play-next'
- takeScreenshot: screenshots/21b_gestures_play_next_off

# Also exercise a right-side chip to test the other store branch
- tapOn:
    id: 'swipe-right-chip-play-next'
- tapOn:
    id: 'swipe-right-chip-play-next'

# Return to hub via back
- pressKey: back
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: 'settings-screen-root'
    timeout: 5000

# ============================================================
# PLAYBACK — exercise radio buttons and verify labels
# ============================================================
- assertVisible:
    id: 'settings-screen-root'
- tapOn:
    id: 'settings-nav-playback'
- extendedWaitUntil:
    visible:
      id: 'settings-screen-playback'
    timeout: 10000
- waitForAnimationToEnd

- assertVisible:
    text: 'Streaming Quality'
- assertVisible:
    text: 'Original Quality'
- assertVisible:
    text: 'High (320kbps)'
- assertVisible:
    text: 'Medium (192kbps)'
- assertVisible:
    text: 'Low (128kbps)'
- takeScreenshot: screenshots/22_settings_playback

# Exercise quality radio: tap High, screenshot, restore to Original
- tapOn:
    text: 'High (320kbps)'
- takeScreenshot: screenshots/22a_playback_high_selected
- tapOn:
    text: 'Original Quality'

# Scroll to verify switches are reachable below the radio group
- scroll:
    direction: DOWN
- assertVisible:
    text: 'Audio Normalization'
- assertVisible:
    text: 'Quality Badge'
- takeScreenshot: screenshots/22b_playback_scrolled

# Return to hub via back
- pressKey: back
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: 'settings-screen-root'
    timeout: 5000

# ============================================================
# STORAGE — uses dedicated testID, scroll to download settings
# ============================================================
- assertVisible:
    id: 'settings-screen-root'
- tapOn:
    id: 'settings-nav-storage'
- extendedWaitUntil:
    visible:
      id: 'settings-screen-storage'
    timeout: 10000
- waitForAnimationToEnd

- assertVisible:
    text: 'Storage overview'
- takeScreenshot: screenshots/23_settings_storage

# Download Settings lives below the StorageSummaryCard — scroll to it
- scroll:
    direction: DOWN
- scroll:
    direction: DOWN
- assertVisible:
    text: 'Download Settings'
- assertVisible:
    text: 'Auto-Download Tracks'
- assertVisible:
    text: 'Download Quality'
- takeScreenshot: screenshots/23a_storage_download_settings

# Return to hub via tab bar (keep one instance to test both nav paths)
- tapOn:
    id: 'settings-tab-button'
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: 'settings-screen-root'
    timeout: 5000

# ============================================================
# PRIVACY & DEVELOPER — toggle Developer Options to reveal PR input
# ============================================================
- assertVisible:
    id: 'settings-screen-root'
- tapOn:
    id: 'settings-nav-privacy-developer'
- extendedWaitUntil:
    visible:
      id: 'settings-screen-privacy-developer'
    timeout: 10000
- waitForAnimationToEnd

- assertVisible:
    text: 'Send Analytics'
- assertVisible:
    text: 'Reduce Haptics'
- assertVisible:
    text: 'Developer Options'
- takeScreenshot: screenshots/24_settings_privacy_developer

# Toggle Developer Options on — should reveal the PR ID input
- tapOn:
    id: 'developer-options-switch'
- scroll:
    direction: DOWN
- assertVisible:
    text: 'Enter PR ID'
- takeScreenshot: screenshots/24a_developer_options_enabled

# Toggle Developer Options off — PR input should disappear
- scroll:
    direction: UP
- tapOn:
    id: 'developer-options-switch'
- assertNotVisible:
    text: 'Enter PR ID'
- takeScreenshot: screenshots/24b_developer_options_disabled

# Return to hub via back
- pressKey: back
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: 'settings-screen-root'
    timeout: 5000

# ============================================================
# ABOUT — verify app name, links, scroll to patrons
# ============================================================
- assertVisible:
    id: 'settings-screen-root'
- tapOn:
    id: 'settings-nav-about'
- extendedWaitUntil:
    visible:
      id: 'settings-screen-about'
    timeout: 10000
- waitForAnimationToEnd

- assertVisible:
    text: 'Jellify'
- assertVisible:
    text: 'View Source'
- assertVisible:
    text: 'Caught a bug?'
- assertVisible:
    text: 'Report Issue'
- assertVisible:
    text: 'Join Discord'
- takeScreenshot: screenshots/25_settings_about

# Scroll to Wall of Fame / patrons section
- scroll:
    direction: DOWN
- assertVisible:
    text: 'Wall of Fame'
- takeScreenshot: screenshots/25a_about_scrolled

# Return to hub via back
- pressKey: back
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: 'settings-screen-root'
    timeout: 5000

# ============================================================
# ACCOUNT — via profile card, verify server info chips
# ============================================================
- assertVisible:
    id: 'settings-screen-root'
- tapOn:
    id: 'settings-profile-card'
- extendedWaitUntil:
    visible:
      id: 'settings-screen-account'
    timeout: 10000
- waitForAnimationToEnd

- assertVisible:
    text: 'Music Library'
- assertVisible:
    text: 'Server'
- assertVisible:
    text: 'Jellyfin User'
- assertVisible:
    id: 'account-change-library-button'

# Scroll to server info chips
- scroll:
    direction: DOWN
- assertVisible:
    text: 'Version'
- assertVisible:
    text: 'Connection'
- takeScreenshot: screenshots/26_settings_account

# Exercise library selection navigation and return
- scroll:
    direction: UP
- tapOn:
    id: 'account-change-library-button'
- extendedWaitUntil:
    visible:
      id: 'library_selection_screen'
    timeout: 10000
- waitForAnimationToEnd
- takeScreenshot: screenshots/27_library_selection

# Back from library selection → account → hub
- pressKey: back
- waitForAnimationToEnd
- pressKey: back
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: 'settings-screen-root'
    timeout: 5000

# ============================================================
# RAPID PUSH/POP STRESS TEST — catch race conditions
# ============================================================
- assertVisible:
    id: 'settings-screen-root'
# Navigate to each screen and immediately back — no waits in between
- tapOn:
    id: 'settings-nav-appearance'
- pressKey: back
- tapOn:
    id: 'settings-nav-gestures'
- pressKey: back
- tapOn:
    id: 'settings-nav-playback'
- pressKey: back
- tapOn:
    id: 'settings-nav-storage'
- pressKey: back
- tapOn:
    id: 'settings-nav-privacy-developer'
- pressKey: back
- tapOn:
    id: 'settings-nav-about'
- pressKey: back
# Let all animations settle and verify the hub is stable
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: 'settings-screen-root'
    timeout: 10000
- assertVisible:
    id: 'settings-profile-card'
- takeScreenshot: screenshots/30_stress_test_hub_stable

# ============================================================
# PERSISTENCE VERIFICATION — re-enter Appearance, confirm state held
# ============================================================
- tapOn:
    id: 'settings-nav-appearance'
- extendedWaitUntil:
    visible:
      id: 'settings-screen-appearance'
    timeout: 10000
- waitForAnimationToEnd
- assertVisible:
    text: 'Purple'
- takeScreenshot: screenshots/31_persistence_check
- pressKey: back
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: 'settings-screen-root'
    timeout: 5000

# ============================================================
# SIGN OUT (cancel) — use Cancel button for deterministic dismissal
# ============================================================
- assertVisible:
    id: 'settings-screen-root'
- tapOn:
    id: 'settings-signout-button'
# Wait for the formSheet modal to appear
- extendedWaitUntil:
    visible:
      text: 'Cancel'
    timeout: 5000
- takeScreenshot: screenshots/28_signout_confirm

# Tap Cancel — calls navigation.goBack(), deterministic across platforms
- tapOn:
    text: 'Cancel'
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: 'settings-screen-root'
    timeout: 5000
- assertVisible:
    id: 'settings-screen-root'
- takeScreenshot: screenshots/29_settings_after_cancel_signout
