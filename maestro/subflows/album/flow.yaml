appId: com.cosmonautical.jellify
---

# Wait for tracks to load
- waitForAnimationToEnd

- takeScreenshot: screenshots/album/album_screen

- assertVisible:
    id: "album-track-1"

# Play first track in album
- tapOn:
    id: "album-track-1"
    optional: true

# Verify miniplayer appears
- assertVisible:
    id: "miniplayer-test-id"
    optional: true
